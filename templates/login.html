<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 风电设备故障诊断一体化问答系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="login-shell login-shell-simple">
    <section class="login-card">
      <div class="login-card-head">
        <div class="login-logo" aria-hidden="true">💊</div>
        <h2>欢迎回来</h2>
        <p>请登录您的账户以继续使用系统</p>
      </div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}
      {% if register_success %}
      <div class="login-error login-success">{{ register_success }}</div>
      {% endif %}

      <form method="post" class="login-form login-form-login {% if register_mode %}hidden{% endif %}" id="loginForm">
        <div class="login-input">
          <span class="login-icon">👤</span>
          <input name="username" type="text" placeholder="请输入用户名" required />
        </div>
        <div class="login-input">
          <span class="login-icon">🔒</span>
          <input name="password" type="password" placeholder="请输入密码" required />
        </div>
        <button type="submit" class="login-btn">立即登录</button>
        <div class="login-switch">还没有账户？ <a href="/login?mode=register" id="showRegister">立即注册</a></div>
      </form>

      {% if register_error %}
      <div class="login-error">{{ register_error }}</div>
      {% endif %}
      <form method="post" action="/register" class="login-form login-form-register {% if not register_mode %}hidden{% endif %}" id="registerForm">
        <div class="login-input">
          <span class="login-icon">👤</span>
          <input name="username" type="text" placeholder="用户名（登录凭证）" required />
        </div>
        <div class="login-input">
          <span class="login-icon">🔒</span>
          <input name="password" type="password" placeholder="密码（安全认证）" required />
        </div>
        <div class="login-input">
          <span class="login-icon">🧭</span>
          <select name="role" required>
            <option value="" disabled selected>请选择身份类型（必选）</option>
            <option value="user">现场运维工程师（普通用户）</option>
            <option value="admin">诊断专家 / 管理者（管理员）</option>
          </select>
        </div>
        <div class="login-input">
          <span class="login-icon">☎️</span>
          <input name="phone" type="text" placeholder="联系电话（可选）" />
        </div>
        <button type="submit" class="login-btn">立即注册</button>
        <div class="login-switch">已有账户？ <a href="/login" id="showLogin">返回登录</a></div>
      </form>
    </section>
  </main>
</body>
</html>
